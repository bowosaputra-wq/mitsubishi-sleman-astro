backend:
  name: git-gateway
  branch: main

media_folder: "public/images"
public_folder: "/images"

collections:
  - name: "config"
    label: "Pengaturan Website"
    delete: false
    editor:
      preview: false
    files:
      - file: "src/data/siteConfig.json"
        label: "Teks Banner & Promo"
        name: "siteConfig"
        fields:
          - label: "Hero (Banner Utama)"
            name: "hero"
            widget: "object"
            fields:
              - {label: "Judul Banner", name: "title", widget: "string"}
              - {label: "Deskripsi Banner", name: "description", widget: "text"}
          - label: "Promo"
            name: "promo"
            widget: "object"
            fields:
              - {label: "Judul Promo", name: "title", widget: "string"}
              - {label: "Deskripsi Promo", name: "description", widget: "text"}
          - label: "Kontak"
            name: "contact"
            widget: "object"
            fields:
              - {label: "Nomor WhatsApp (Contoh: 628974362666)", name: "whatsappNumber", widget: "string"}
              - {label: "Template Pesan WA", name: "waMessageTemplate", widget: "string"}

  - name: "catalog"
    label: "Katalog Mobil"
    delete: false
    editor:
      preview: false
    files:
      - file: "src/data/cars.json"
        label: "Daftar Mobil Tersedia"
        name: "cars"
        fields:
          - label: "Mobil"
            name: "cars"
            widget: "list"
            fields:
              - {label: "ID Unik (huruf kecil, tanpa spasi)", name: "id", widget: "string"}
              - {label: "Nama Mobil", name: "title", widget: "string"}
              - {label: "Harga (Teks)", name: "price", widget: "string"}
              - {label: "Deskripsi Singkat", name: "description", widget: "text"}
              - {label: "Foto Unit", name: "image", widget: "image"}
              - {label: "Link Detail (opsional, isi # jika tidak ada)", name: "slug", widget: "string"}
              - label: "Badge Promosi"
                name: "badges"
                widget: "list"
                required: false
                field: {name: "badge", label: "Badge", widget: "string"}
